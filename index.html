<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Notes</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
            background-color: #f9f9f9;
        }
        h1 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .download-box {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: #3498db;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background: #2980b9; }
        .viewer-container {
            height: 800px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <h1>Course Materials</h1>

    <div class="download-box">
        <h3>Calculus II Study Notes</h3>
        <p>Handwritten notes exported from Huawei Notes. Optimized for high-resolution viewing.</p>
        <a href="Calculus II.pdf" class="btn" target="_blank">View / Download PDF</a>
    </div>

    <h3>Interactive Viewer</h3>
    <div class="viewer-container">
        <iframe src="Calculus II.pdf">
            <p>This browser does not support inline PDFs. Please use the link above to view the file.</p>
        </iframe>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Math Portal</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #5f6368; margin-bottom: 30px; }
        .btn { 
            background: #1a73e8; color: white; padding: 15px 30px; 
            text-decoration: none; border-radius: 8px; font-weight: bold;
            transition: transform 0.2s; display: inline-block;
        }
        .btn:hover { transform: translateY(-3px); background: #1557b0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Study Repository</h1>
        <p>A collection of my handwritten Calculus II notes.</p>
        <a href="./calculus-ii/" class="btn">View Calculus II Notes</a>
    </div>
</body>
</html>
